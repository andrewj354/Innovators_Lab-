version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: innovators_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - innovators_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: innovators_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - innovators_network

  # API Gateway (Port 8000)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: innovators_gateway
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-innovators-lab-shared-secret-key-2024
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=postgres
      - DB_NAME=gateway_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,api-gateway,0.0.0.0,gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api-gateway:/app
    networks:
      - innovators_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Service (Port 8001)
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: innovators_user_service
    ports:
      - "8001:8001"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-innovators-lab-shared-secret-key-2024
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=postgres
      - DB_NAME=user_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,user-service,0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/user-service:/app
    networks:
      - innovators_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Tournament Service (Port 8003)
  tournament-service:
    build:
      context: ./services/tournament-service
      dockerfile: Dockerfile
    container_name: innovators_tournament_service
    ports:
      - "8003:8003"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-innovators-lab-shared-secret-key-2024
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=postgres
      - DB_NAME=tournament_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/2
      - ALLOWED_HOSTS=localhost,127.0.0.1,tournament-service,0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/tournament-service:/app
    networks:
      - innovators_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/tournaments/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Task Service (Port 8002)
  task-service:
    build:
      context: ./services/task-service
      dockerfile: Dockerfile
    container_name: innovators_task_service
    ports:
      - "8002:8002"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-innovators-lab-shared-secret-key-2024
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=postgres
      - DB_NAME=task_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/3
      - ALLOWED_HOSTS=localhost,127.0.0.1,task-service,0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/task-service:/app
    networks:
      - innovators_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: innovators_frontend
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_API_GATEWAY_URL=http://localhost:8000
    depends_on:
      - api-gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - innovators_network

volumes:
  postgres_data:

networks:
  innovators_network:
    driver: bridge
